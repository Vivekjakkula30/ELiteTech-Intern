<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FocusFlow</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">

    <!-- Header -->
    <h1>🚀 FocusFlow</h1>

    <!-- Theme Toggle -->
    <button id="themeToggle" class="theme-btn">🌙 Toggle Theme</button>

    <!-- Task Section -->
    <div class="section">
      <h2>📌 Tasks</h2>
      <input type="text" id="taskInput" placeholder="Add a new task">
      <button id="addTask">Add Task</button>
      <ul id="taskList"></ul>
    </div>

    <!-- Productivity Analytics -->
    <div class="section">
      <h3>✅ Completed Tasks: <span id="completedCount">0</span></h3>
    </div>

    <!-- Pomodoro Timer -->
    <div class="section timer">
      <h2>⏳ Pomodoro Timer</h2>
      <h3 id="time">25:00</h3>
      <button id="startTimer">Start Timer</button>
    </div>

    <!-- Daily Goal -->
    <div class="section">
      <h2>🎯 Daily Goal</h2>
      <input type="text" id="goalInput" placeholder="Set today's goal">
      <button id="setGoal">Save Goal</button>
      <p id="goalDisplay"></p>
    </div>

    <!-- Notes -->
    <div class="section">
      <h2>📝 Quick Notes</h2>
      <textarea id="notes" placeholder="Write your notes here..."></textarea>
    </div>

    <!-- Website Blocker -->
    <div class="section">
      <h2>🚫 Website Blocker</h2>
      <p>Blocked Sites:</p>
      <ul id="blockedList">
        <li>YouTube</li>
        <li>Instagram</li>
        <li>Facebook</li>
      </ul>
    </div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
